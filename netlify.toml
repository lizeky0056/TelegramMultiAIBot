[build]
  command = "pip install -r requirements.txt"
  functions = "netlify/functions"

[build.environment]
  PYTHON_VERSION = "3.10"

[functions]
  included_files = ["*.py", "*.json", "db.json", "tokens.json"]
  node_bundler = "esbuild"

[[redirects]]
  from = "/.netlify/functions/web/*"
  to = "/.netlify/functions/web/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/web"
  status = 200
  force = true
